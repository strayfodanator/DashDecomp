name: DashDecomp CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Verify Matching
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            cmake build-essential

      - name: Install ctrtool and 3dstool
        run: |
          # Build ctrtool from source
          git clone --depth=1 https://github.com/3DSGuy/Project_CTR.git /tmp/ctrtool
          cd /tmp/ctrtool/ctrtool && make -j$(nproc)
          sudo install -m755 ctrtool /usr/local/bin/ctrtool

          # Build 3dstool from source
          git clone --depth=1 https://github.com/dnasdw/3dstool.git /tmp/3dstool
          cd /tmp/3dstool && cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
          sudo install -m755 build/3dstool /usr/local/bin/3dstool

      - name: Set up Python venv & install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Build project (src/ + asm/)
        run: make -j$(nproc)

      # NOTE: The ROM is never stored in the repo.
      # The matching check only runs locally when a developer has the ROM.
      # In CI, we only verify that the build compiles successfully without errors.
      - name: Verify build artifacts exist
        run: |
          if [ -f build/dashdecomp.bin ]; then
            echo "✅ Build output exists"
            ls -lh build/dashdecomp.bin
          else
            echo "❌ Build output missing"
            exit 1
          fi

      - name: Print progress report
        run: |
          source .venv/bin/activate
          python tools/check_matching.py --json

      - name: Comment progress on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              const output = execSync('source .venv/bin/activate && python tools/check_matching.py', {
                shell: '/bin/bash',
                encoding: 'utf8',
                cwd: process.env.GITHUB_WORKSPACE
              });
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🏁 DashDecomp Progress\n\`\`\`\n${output}\n\`\`\``
              });
            } catch (e) {
              console.log('Could not post progress comment:', e.message);
            }
