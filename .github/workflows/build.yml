name: Build & Progress Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Generate Progress Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate progress report
        run: python tools/generate_report.py --output build/report.json

      - name: Show progress summary
        run: |
          echo "── DashDecomp Progress Report ──"
          python -c "
          import json, sys
          r = json.load(open('build/report.json'))
          m = r['measures']
          total = m['totalFunctions']
          matched = m['matchedFunctions']
          pct = m['fuzzyMatchPercent']
          print(f'Functions : {matched}/{total}')
          print(f'Progress  : {pct:.2f}%')
          "

      # decomp.dev reads GitHub Actions artifacts named: {version}_report
      # The artifact must contain report.json at its root.
      - name: Upload progress report artifact
        uses: actions/upload-artifact@v4
        with:
          name: MK7USA_v10_report
          path: build/report.json
          retention-days: 90

      # Comment on PRs with progress diff (only on pull_request events)
      - name: Post PR comment with progress
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('build/report.json', 'utf8'));
            const m = report.measures;
            const total    = m.totalFunctions;
            const matched  = m.matchedFunctions;
            const pct      = m.fuzzyMatchPercent.toFixed(2);
            const codeKB   = (m.matchedCode / 1024).toFixed(1);
            const totalKB  = (m.totalCode / 1024).toFixed(1);

            const body = [
              '## 🏁 DashDecomp Progress Report',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Functions matched | \`${matched} / ${total}\` |`,
              `| Code matched      | \`${codeKB} KB / ${totalKB} KB\` |`,
              `| Overall progress  | \`${pct}%\` |`,
              '',
              '> View live progress at [decomp.dev/strayfodanator/DashDecomp](https://decomp.dev/strayfodanator/DashDecomp)',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
